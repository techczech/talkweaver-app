<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Two boxes labelled MODEL and HARNESS joined by arrows">
  <rect width="640" height="360" fill="#fffdf2"/>
  <g font-family="Georgia, serif" text-anchor="middle">
    <rect x="60" y="120" width="200" height="120" rx="14" fill="#0b3a6b"/>
    <text x="160" y="188" fill="#fffdf2" font-size="34">MODEL</text>
    <rect x="380" y="120" width="200" height="120" rx="14" fill="#b45309"/>
    <text x="480" y="188" fill="#fffdf2" font-size="30">HARNESS</text>
    <line x1="262" y1="160" x2="378" y2="160" stroke="#17202a" stroke-width="4"/>
    <polygon points="378,160 360,152 360,168" fill="#17202a"/>
    <line x1="378" y1="200" x2="262" y2="200" stroke="#17202a" stroke-width="4"/>
    <polygon points="262,200 280,192 280,208" fill="#17202a"/>
    <text x="320" y="300" fill="#384452" font-size="20" font-family="Helvetica, sans-serif">a string round-trips between them</text>
  </g>
</svg>
